services:
  hub:
    build: .
    container_name: monitor-hub
    restart: unless-stopped
    ports:
      - "9991:9991"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9991/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
